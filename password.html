<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEMM Archives - Incognito</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-image: url('pw-bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
  </style>
</head>
<body>

  <div class="pw-page-wrap">
    <img id="pw-char-left" class="pw-character left" src="" alt="" style="display:none;">
    <img id="pw-char-right" class="pw-character right" src="" alt="" style="display:none;">

    <div class="pw-meme" id="pw-meme">
      <img src="" alt="reaction" id="pw-meme-img">
      <div class="meme-label" id="pw-meme-label">Wrong answer</div>
    </div>

    <div id="pw-bubble" class="pw-bubble">
      <input type="password" class="pw-input" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPassword()">
    </div>

    <div class="pw-status" id="pw-status">
      <span id="pw-status-text"></span>
      <div id="cooldown-timer" style="display:none;"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
